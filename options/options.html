<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gatekeeper · Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="topbar">
        <div class="brand">
          <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 1.5a5 5 0 0 0-5 5V9H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-1V6.5a5 5 0 0 0-5-5Zm3 7.5H9V6.5a3 3 0 0 1 6 0V9Z"
            />
          </svg>
          <h1>Gatekeeper</h1>
        </div>
        <p class="tagline">Intentional browsing. Everything stays on this machine.</p>
      </header>

      <section class="panel">
        <h2>Gated sites</h2>
        <p class="muted">Subdomains are matched automatically — <code>youtube.com</code> also gates <code>m.youtube.com</code>.</p>
        <form id="addForm" class="add-row">
          <input id="addInput" type="text" placeholder="e.g. news.ycombinator.com" autocomplete="off" spellcheck="false" />
          <button type="submit" class="primary">Add</button>
        </form>
        <ul id="siteList" class="site-list"></ul>
      </section>

      <section class="panel">
        <h2>Today</h2>
        <div id="stats" class="stats"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Recent sessions</h2>
          <span class="muted" id="logCount"></span>
        </div>
        <div class="table-scroll">
          <table class="log">
            <thead>
              <tr>
                <th>When</th>
                <th>Host</th>
                <th>Reason</th>
                <th>Min</th>
                <th>Outcome</th>
                <th>Fulfilled</th>
              </tr>
            </thead>
            <tbody id="logBody"></tbody>
          </table>
        </div>
      </section>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
